<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boiler 3D Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #0d1117;
      --poster-color: #0d1117;
    }
    model-viewer::part(default-progress-bar) {
      background: #1e3a5f;
    }
    #controls {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      background: rgba(13, 17, 23, 0.85);
      border: 1px solid rgba(88, 166, 255, 0.2);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      gap: 16px;
      align-items: center;
      backdrop-filter: blur(8px);
    }
    .slider-group {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .slider-group label {
      color: #8b949e;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      min-width: 36px;
    }
    .slider-group input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #1e3a5f;
      border-radius: 2px;
      outline: none;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: pointer;
    }
    .slider-group .water input::-webkit-slider-thumb { background: #4fc3f7; }
    .slider-group .flame input::-webkit-slider-thumb { background: #ff9800; }
    .slider-group .fan input::-webkit-slider-thumb { background: #4dd0e1; }
    .value-display {
      color: #58a6ff;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      min-width: 30px;
      text-align: right;
    }
    #info-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(30, 58, 95, 0.8);
      border-radius: 4px;
      padding: 3px 8px;
      color: #4fc3f7;
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 1.5px;
      font-family: 'Segoe UI', sans-serif;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    alt="Caldeira Aquatubular - Digital Twin"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    shadow-softness="0.5"
    exposure="1.2"
    environment-image="neutral"
    interaction-prompt="none"
    camera-orbit="45deg 65deg 6m"
    min-camera-orbit="auto auto 2m"
    max-camera-orbit="auto auto 15m"
    field-of-view="30deg"
  >
  </model-viewer>

  <div id="info-badge">DIGITAL TWIN</div>

  <div id="controls">
    <div class="slider-group water">
      <label>💧 Nível</label>
      <input type="range" id="waterLevel" min="0" max="100" value="65">
      <span class="value-display" id="waterVal">65%</span>
    </div>
    <div class="slider-group flame">
      <label>🔥 Chama</label>
      <input type="range" id="flameIntensity" min="0" max="100" value="70">
      <span class="value-display" id="flameVal">70%</span>
    </div>
    <div class="slider-group fan">
      <label>🌬️ FD Fan</label>
      <input type="range" id="fanSpeed" min="0" max="100" value="50">
      <span class="value-display" id="fanVal">50%</span>
    </div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const waterSlider = document.getElementById('waterLevel');
    const flameSlider = document.getElementById('flameIntensity');
    const fanSlider = document.getElementById('fanSpeed');

    // ── Model source ──
    // The model path is set via postMessage or query params
    const params = new URLSearchParams(window.location.search);
    const modelSrc = params.get('model') || 'boiler.glb';
    viewer.setAttribute('src', modelSrc);

    // ── Slider updates ──
    waterSlider.addEventListener('input', (e) => {
      const v = e.target.value;
      document.getElementById('waterVal').textContent = v + '%';
      updateWaterLevel(v / 100);
      notifyFlutter('waterLevel', v / 100);
    });

    flameSlider.addEventListener('input', (e) => {
      const v = e.target.value;
      document.getElementById('flameVal').textContent = v + '%';
      updateFlame(v / 100);
      notifyFlutter('flameIntensity', v / 100);
    });

    fanSlider.addEventListener('input', (e) => {
      const v = e.target.value;
      document.getElementById('fanVal').textContent = v + '%';
      updateFanSpeed(v / 100);
      notifyFlutter('fanSpeed', v / 100);
    });

    // ── 3D model manipulation ──
    function updateWaterLevel(level) {
      // Scale WaterLevel mesh on Y axis
      if (!viewer.model) return;
      try {
        const waterNode = findNode('WaterLevel');
        if (waterNode) {
          waterNode.scale = { x: 1, y: Math.max(level, 0.01), z: 1 };
        }
      } catch (e) { console.log('WaterLevel update:', e); }
    }

    function updateFlame(intensity) {
      if (!viewer.model) return;
      try {
        const flameNode = findNode('Flame');
        if (flameNode) {
          const s = Math.max(intensity, 0.01);
          flameNode.scale = { x: s, y: s, z: s };
          // visibility toggle
          if (intensity < 0.02) {
            flameNode.scale = { x: 0.001, y: 0.001, z: 0.001 };
          }
        }
      } catch (e) { console.log('Flame update:', e); }
    }

    let fanAnimationId = null;
    let currentFanAngle = 0;

    function updateFanSpeed(speed) {
      // We animate fans via JS rotation
      if (fanAnimationId) cancelAnimationFrame(fanAnimationId);
      if (speed < 0.01) return;

      function animateFans() {
        currentFanAngle += speed * 0.1;
        if (currentFanAngle > Math.PI * 2) currentFanAngle -= Math.PI * 2;
        // Try to rotate fan nodes
        try {
          for (const name of ['PrimaryAirFan', 'SecondaryAirFan', 'InducedDraftFan', 'ForcedDraftFan']) {
            const node = findNode(name);
            if (node) {
              // model-viewer glTF node rotation as quaternion
              const c = Math.cos(currentFanAngle / 2);
              const s = Math.sin(currentFanAngle / 2);
              node.orientation = { x: 0, y: 0, z: s, w: c };
            }
          }
        } catch (e) {}
        fanAnimationId = requestAnimationFrame(animateFans);
      }
      animateFans();
    }

    function findNode(name) {
      if (!viewer.model) return null;
      // Search scene graph for named node
      const root = viewer.model;
      return searchNode(root, name);
    }

    function searchNode(node, name) {
      if (!node) return null;
      if (node.name === name) return node;
      if (node.children) {
        for (const child of node.children) {
          const found = searchNode(child, name);
          if (found) return found;
        }
      }
      return null;
    }

    // ── Flutter communication ──
    function notifyFlutter(param, value) {
      // For webview_windows (WebView2) postMessage
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({ param, value }));
      }
      // For webview_flutter JavaScript channel
      if (window.FlutterChannel) {
        window.FlutterChannel.postMessage(JSON.stringify({ param, value }));
      }
    }

    // Listen for messages from Flutter (webview_windows postWebMessage)
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener('message', (event) => {
        handleFlutterMessage(event.data);
      });
    }
    // Also listen for window.postMessage
    window.addEventListener('message', (event) => {
      handleFlutterMessage(event.data);
    });

    function handleFlutterMessage(raw) {
      try {
        const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
        if (data.waterLevel !== undefined) {
          waterSlider.value = data.waterLevel * 100;
          document.getElementById('waterVal').textContent = Math.round(data.waterLevel * 100) + '%';
          updateWaterLevel(data.waterLevel);
        }
        if (data.flameIntensity !== undefined) {
          flameSlider.value = data.flameIntensity * 100;
          document.getElementById('flameVal').textContent = Math.round(data.flameIntensity * 100) + '%';
          updateFlame(data.flameIntensity);
        }
        if (data.fanSpeed !== undefined) {
          fanSlider.value = data.fanSpeed * 100;
          document.getElementById('fanVal').textContent = Math.round(data.fanSpeed * 100) + '%';
          updateFanSpeed(data.fanSpeed);
        }
        if (data.hideControls === true) {
          document.getElementById('controls').style.display = 'none';
        }
      } catch (e) {}
    }

    // ── Initialize ──
    viewer.addEventListener('load', () => {
      console.log('Model loaded');
      updateWaterLevel(0.65);
      updateFlame(0.70);
      updateFanSpeed(0.50);
    });
  </script>
</body>
</html>
