name: process_simul
description: HART/Modbus Industrial Process Simulator - PACTware compatible

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.4
  sqlite3: ^2.7.5
  sqlite3_flutter_libs: ^0.5.32
  excel: ^4.0.6
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  collection: ^1.18.0
  file_picker: ^8.1.2
  # Serial port - desktop only; skip on Android/iOS
  # flutter_libserialport: ^0.2.2  # add manually for desktop builds

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
